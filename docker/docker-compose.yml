version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: showpur_db
      POSTGRES_USER: showpur_user
      POSTGRES_PASSWORD: showpur_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../showpur_core
      dockerfile: ../docker/Dockerfile.backend
    environment:
      - DEBUG=1
      - DB_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - ../showpur_core:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - media_volume:/media
      - static_volume:/static
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  media_volume:
  static_volume:
  